<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>飞鱼大作战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      font-family: Arial, sans-serif;
      z-index: 100;
    }
    
    #logControl {
      display: none;
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      z-index: 100;
    }
    
    #weaponSelector {
      position: fixed;
      top: 10px;
      left: calc(50% - 50px);
      transform: translateX(-50%);
      width: 50px;
      height: 50px;
      background-image: url('images/baoxiang.png');
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      cursor: pointer;
      z-index: 100;
    }
    
    #weaponOptions {
      position: fixed;
      top: 70px;
      left: calc(50% - 50px);
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      border-radius: 8px;
      padding: 10px;
      display: none;
      z-index: 101;
    }
    
    #weaponOptions img {
      width: 50px;
      height: 50px;
      margin: 5px;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 4px;
    }
    
    #weaponOptions img:hover {
      border-color: #FFD700;
    }
    
    #weaponOptions img.selected {
      border-color: #00FF00;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">加载中...</div>
  <canvas id="gameCanvas"></canvas>
  <div id="weaponSelector"></div>
  <div id="weaponOptions">
    <img src="images/yucha.png" data-weapon="0" alt="武器1">
    <img src="images/yucha2.png" data-weapon="1" alt="武器2">
  </div>
  <div id="logControl">导出日志</div>
  <script src="game.js"></script>
  <script>
    // 添加日志导出按钮事件
    document.getElementById('logControl').addEventListener('click', function() {
      if (window.game) {
        window.game.exportLogs();
      }
    });
    
    // 武器选择器事件
    const weaponSelector = document.getElementById('weaponSelector');
    const weaponOptions = document.getElementById('weaponOptions');
    const weaponImages = weaponOptions.querySelectorAll('img');
    
    weaponSelector.addEventListener('click', function() {
      weaponOptions.style.display = weaponOptions.style.display === 'block' ? 'none' : 'block';
      updateWeaponLockState();
    });
    
    function updateWeaponLockState() {
      weaponImages.forEach(img => {
        const weaponIndex = parseInt(img.dataset.weapon);
        if (window.game && !window.game.isWeaponUnlocked(weaponIndex)) {
          img.style.opacity = '0.3';
          img.style.filter = 'grayscale(100%)';
          img.title = '需要3级解锁';
        } else {
          img.style.opacity = '1';
          img.style.filter = 'none';
          img.title = '';
        }
      });
    }
    
    weaponImages.forEach(img => {
      img.addEventListener('click', function() {
        const weaponIndex = parseInt(this.dataset.weapon);
        if (window.game) {
          if (!window.game.isWeaponUnlocked(weaponIndex)) {
            return;
          }
          window.game.selectWeapon(weaponIndex);
        }
        weaponImages.forEach(i => i.classList.remove('selected'));
        this.classList.add('selected');
        weaponOptions.style.display = 'none';
      });
    });
  </script>
</body>
</html>
